<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>אייפון בקלות</title>
<style>
  :root{
    --teal-900:#1f4550;
    --teal-800:#2b5f6f;
    --teal-700:#356f80;
    --cream:#f7f3ea;
    --cream-2:#fffdf8;
    --ink:#26333a;
    --ink-soft:#5b6b70;
    --line:#e4dfd0;
    --green:#3f7a56;
    --green-bg:#eef6f0;
    --amber:#c98a3a;
    --shadow: 0 2px 10px rgba(31,69,80,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:"Segoe UI","Arial Hebrew","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    font-size: calc(16px * var(--scale, 1));
  }
  .app{max-width:640px;margin:0 auto;min-height:100vh;background:var(--cream);display:flex;flex-direction:column;}

  header.top{
    background:linear-gradient(135deg,var(--teal-800),var(--teal-900));
    color:#fff;
    padding:18px 18px 22px;
    position:sticky; top:0; z-index:20;
    box-shadow: var(--shadow); position:relative;
  }
  .top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .back-btn{
    background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.35);
    color:#fff; border-radius:12px; padding:8px 14px; font-size:1em; cursor:pointer;
  }
  .text-size{display:flex; gap:6px;}
  .text-size button{
    background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.35);
    color:#fff; border-radius:10px; width:40px;height:36px; font-weight:700; font-size:1em; cursor:pointer;
  }
  .title-block{margin-top:44px;}
  .app-title{font-size:1.5em; font-weight:800; margin:0;}
  .app-sub{margin:4px 0 0; opacity:.85; font-size:.95em;}
  .cat-title{font-size:1.35em;font-weight:800;margin:14px 0 2px;display:flex;align-items:center;gap:10px;}
  .cat-icon-big{font-size:1.3em;}
  .cat-progress-line{opacity:.85;font-size:.9em;margin:0;}
  .progress-track{height:8px;background:rgba(255,255,255,.25);border-radius:6px;margin-top:10px;overflow:hidden;}
  .progress-fill{height:100%;background:#a9d8bd;border-radius:6px;transition:width .35s ease;}

  .search-wrap{padding:14px 16px 4px;}
  .search-box{
    width:100%; padding:13px 16px; border-radius:14px; border:1px solid var(--line);
    background:var(--cream-2); font-size:1em; color:var(--ink); outline:none;
  }
  .search-box:focus{border-color:var(--teal-700); box-shadow:0 0 0 3px rgba(53,111,128,.15);}

  main{flex:1; padding:6px 16px 40px;}

  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px;}
  .cat-card{
    background:var(--cream-2); border:1px solid var(--line); border-radius:18px;
    padding:16px 12px; text-align:center; cursor:pointer; box-shadow:var(--shadow);
    display:flex; flex-direction:column; align-items:center; gap:8px;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .cat-card:active{transform:scale(.97);}
  .ring-wrap{position:relative; width:64px; height:64px;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-icon{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:1.7em;}
  .cat-name{font-weight:700; font-size:1em; line-height:1.25;}
  .cat-frac{font-size:.82em; color:var(--ink-soft);}
  .level-badge{font-size:.68em; font-weight:800; padding:2px 9px; border-radius:20px; display:inline-block;}
  .level-קל{background:#e3f1e8; color:var(--green);}
  .level-בינוני{background:#fdf0dd; color:var(--amber);}
  .level-מתקדם{background:#fbe3e3; color:#b23b3b;}
  .level-חובה{background:#26333a; color:#fff;}

  .warn-box{
    display:flex; gap:10px; align-items:flex-start; background:#fff6e9; border:1.5px solid var(--amber);
    border-radius:12px; padding:12px 14px; margin:0 0 16px; font-size:.92em; line-height:1.55; color:#6b4a1a;
  }
  .warn-box .warn-ic{font-size:1.2em; flex-shrink:0;}

  .diagram-wrap{background:var(--cream-2); border:1px solid var(--line); border-radius:18px; padding:14px; margin:14px 0; box-shadow:var(--shadow);}
  .diagram-caption{font-size:.8em; color:var(--ink-soft); text-align:center; margin-top:8px;}

  .overall-card{
    grid-column:1 / -1; background:var(--teal-900); color:#fff; border-radius:18px; padding:16px;
    display:flex; align-items:center; justify-content:space-between; gap:14px; box-shadow:var(--shadow);
  }
  .overall-card .num{font-size:1.7em; font-weight:800;}
  .overall-card .label{font-size:.85em; opacity:.85;}

  .step-card{
    background:var(--cream-2); border:1px solid var(--line); border-radius:16px;
    margin:12px 0; overflow:hidden; box-shadow:var(--shadow);
  }
  .step-card.learned{border-color:var(--green); }
  .step-head{
    display:flex; align-items:center; gap:12px; padding:16px; cursor:pointer;
  }
  .step-num{
    width:34px;height:34px;border-radius:50%; background:var(--teal-800); color:#fff;
    display:flex;align-items:center;justify-content:center; font-weight:800; flex-shrink:0; font-size:.9em;
  }
  .step-card.learned .step-num{background:var(--green);}
  .step-title{font-weight:700; font-size:1.05em; flex:1; line-height:1.3;}
  .chev{font-size:1.1em; color:var(--ink-soft); transition:transform .2s ease;}
  .step-card.open .chev{transform:rotate(180deg);}
  .step-body{max-height:0; overflow:hidden; transition:max-height .3s ease;}
  .step-card.open .step-body{max-height:700px;}
  .step-body-inner{padding:0 16px 18px; border-top:1px solid var(--line); padding-top:14px;}
  .step-text{font-size:1em; line-height:1.7; color:var(--ink); margin:0 0 16px; white-space:pre-line;}
  .mini-steps{list-style:none;margin:0 0 16px;padding:0;display:flex;flex-direction:column;gap:11px;}
  .mini-steps li{display:flex;gap:10px;align-items:flex-start;font-size:1em;line-height:1.6;}
  .mini-num{flex-shrink:0;width:25px;height:25px;border-radius:50%;background:var(--teal-700);color:#fff;
    font-size:.78em;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .btn-row{display:flex; flex-wrap:wrap; gap:10px;}
  .btn{
    border:none; border-radius:12px; padding:11px 18px; font-size:.95em; font-weight:700;
    cursor:pointer; display:inline-flex; align-items:center; gap:8px;
  }
  .btn-read{background:var(--teal-800); color:#fff;}
  .btn-read:active{background:var(--teal-900);}
  .btn-read.speaking{background:var(--amber);}
  .btn-learn{background:#fff; color:var(--green); border:1.5px solid var(--green);}
  .btn-learn.on{background:var(--green-bg);}

  .empty{text-align:center; color:var(--ink-soft); padding:40px 10px;}
  .disclaimer{font-size:.78em; color:var(--ink-soft); text-align:center; padding:14px 20px 6px; line-height:1.5;}
  .search-results-hint{font-size:.85em; color:var(--ink-soft); margin:6px 2px 0;}
  .voice-note{font-size:.72em; color:var(--ink-soft); text-align:center; padding:2px 20px 10px;}
  .brand-logo{position:absolute; top:14px; left:16px; height:40px; width:auto; z-index:5;}
  .gate-logo{position:absolute; top:16px; left:16px; height:44px; width:auto;}

  /* ---- registration gate ---- */
  #gate{
    position:fixed; inset:0; background:var(--teal-900); z-index:100;
    display:flex; align-items:center; justify-content:center; padding:20px;
    overflow-y:auto;
  }
  .gate-card{
    background:var(--cream-2); border-radius:22px; padding:26px 22px; max-width:420px; width:100%;
    box-shadow:0 10px 40px rgba(0,0,0,.3); position:relative;
  }
  .gate-title{font-size:1.35em; font-weight:800; margin:48px 0 6px; color:var(--ink); text-align:center;}
  .gate-sub{font-size:.92em; color:var(--ink-soft); text-align:center; margin:0 0 20px; line-height:1.6;}
  .gate-field{margin-bottom:14px;}
  .gate-field label{display:block; font-size:.9em; font-weight:700; margin-bottom:6px; color:var(--ink);}
  .gate-field input{
    width:100%; padding:12px 14px; border-radius:12px; border:1.5px solid var(--line);
    font-size:1em; background:#fff; color:var(--ink); outline:none;
  }
  .gate-field input:focus{border-color:var(--teal-700); box-shadow:0 0 0 3px rgba(53,111,128,.15);}
  .gate-error{color:#b23b3b; font-size:.85em; margin:-6px 0 12px; display:none;}
  .gate-submit{
    width:100%; padding:14px; border:none; border-radius:14px; background:var(--teal-800); color:#fff;
    font-size:1.05em; font-weight:800; cursor:pointer; margin-top:6px;
  }
  .gate-submit:disabled{opacity:.55;}
  .gate-note{font-size:.75em; color:var(--ink-soft); text-align:center; margin-top:14px; line-height:1.5;}
</style>
</head>

/* Universal storage: tries window.storage (works inside claude.ai artifacts),
   falls back to localStorage (works when the file is shared/opened anywhere else). */
async function universalGet(key){
  try{
    if(window.storage){
      const res = await window.storage.get(key, false);
      return res ? res.value : null;
    }
  }catch(e){ /* fall through to localStorage */ }
  try{ return window.localStorage.getItem(key); }catch(e){ return null; }
}
async function universalSet(key, value){
  try{
    if(window.storage){ await window.storage.set(key, value, false); return; }
  }catch(e){ /* fall through to localStorage */ }
  try{ window.localStorage.setItem(key, value); }catch(e){ /* ignore */ }
}

/* ---------- persistence ---------- */
async function loadProgress(){
  try{
    const val = await universalGet(STORAGE_KEY);
    if(val){ learned = JSON.parse(val); }
  }catch(e){ /* nothing saved yet */ }
  render();
}
async function saveProgress(){
  try{ await universalSet(STORAGE_KEY, JSON.stringify(learned)); }
  catch(e){ console.error("storage error", e); }
}

function splitMiniSteps(body){
  if(body.indexOf(">") === -1) return null;
  return body.split(">").map(function(s){ return s.trim(); }).filter(Boolean);
}

function stepBodyHtml(body){
  const parts = splitMiniSteps(body);
  if(!parts) return '<p class="step-text">'+escapeHtml(body)+'</p>';
  return '<ol class="mini-steps">' + parts.map(function(p,i){
    return '<li><span class="mini-num">'+(i+1)+'</span><span>'+escapeHtml(p)+'</span></li>';
  }).join("") + '</ol>';
}

function stepSpeechText(step){
  const parts = splitMiniSteps(step.b);
  if(!parts) return step.t + ". " + step.b;
  let out = step.t + ". ";
  parts.forEach(function(p,i){ out += "שלב "+(i+1)+": "+p+". "; });
  return out;
}

}

    + 'stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" stroke-linecap="round"/></svg>';
}

/* ---------- speech (proper Hebrew voice) ---------- */
function pickHebrewVoice(){
  if(!('speechSynthesis' in window)) return null;
  const voices = speechSynthesis.getVoices() || [];
  if(!voices.length) return null;
  let v = voices.find(v => v.lang && v.lang.toLowerCase() === "he-il");
  if(!v) v = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("he"));
  if(!v) v = voices.find(v => /hebrew/i.test(v.name||""));
  return v || null;
}
if('speechSynthesis' in window){
  hebrewVoice = pickHebrewVoice();
  speechSynthesis.onvoiceschanged = function(){
    hebrewVoice = pickHebrewVoice();
  };
}

function speak(text, key){
  if(!('speechSynthesis' in window)){
    alert("הדפדפן הזה לא תומך בהקראה קולית");
    return;
  }
  if(speakingKey === key){
    speechSynthesis.cancel();
    speakingKey = null;
    render();
    return;
  }
  speechSynthesis.cancel();
  if(!hebrewVoice) hebrewVoice = pickHebrewVoice();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "he-IL";
  if(hebrewVoice) u.voice = hebrewVoice;
  u.rate = 0.68;
  u.pitch = 1;
  u.onend = function(){ speakingKey = null; render(); };
  u.onerror = function(){ speakingKey = null; render(); };
  speakingKey = key;
  speechSynthesis.speak(u);
  render();
}

      + (q && hasStepMatches ? '<p class="search-results-hint">נמצאו שלבים תואמים בתוך הנושאים המסומנים למעלה — לחצו על הנושא כדי לפתוח אותם.</p>' : "")
      + (q && cats.length===0 ? '<div class="empty">לא נמצאו תוצאות עבור "'+escapeHtml(search)+'"</div>' : "")
      + '<p class="disclaimer">האפליקציה נבנתה במיוחד כדי להפוך את האייפון לפשוט וברור. אפשר לחזור לכאן בכל זמן.</p>'
    + '</main>';

  const box = document.getElementById("searchBox");
  if(box){
    box.addEventListener("input", function(){
      search = this.value;
      searchCaret = this.selectionStart;
      render();
    });
    if(searchCaret !== null){
      box.focus();
      try{ box.setSelectionRange(searchCaret, searchCaret); }catch(e){}
    }
  }
}

function renderCategory(){
  const cat = findCategory(view.id);
  const app = document.getElementById("app");
  if(!cat){ goHome(); return; }
  const lc = learnedCount(cat), pc = cat.steps.length? Math.round(lc/cat.steps.length*100):0;

  app.innerHTML =
    '<header class="top">'
      + '<div class="top-row">'
        + '<button class="back-btn" data-action="go-home" aria-label="חזרה לכל הנושאים">→ כל הנושאים</button>'
        + '<div class="text-size">'
          + '<button data-action="scale-up" aria-label="הגדלת טקסט">א+</button>'
          + '<button data-action="scale-down" aria-label="הקטנת טקסט">א-</button>'
        + '</div>'
      + '</div>'
      + '<div class="cat-title"><span class="cat-icon-big">'+cat.icon+'</span>'+escapeHtml(cat.name)+'</div>'
      + '<div class="progress-track"><div class="progress-fill" style="width:'+pc+'%"></div></div>'
      + '<p class="cat-progress-line" style="margin-top:6px;">'+lc+' מתוך '+cat.steps.length+' שלבים נלמדו</p>'
    + '</header>'
    + '<main>'
      + (cat.id === "meetiphone" ? '<div class="diagram-wrap">'+iphoneDiagramSVG()+iphoneDiagramLegend()+'</div>' : "")
      + cat.steps.map(function(s,i){
          const key = cat.id+"-"+i;
          const isOpen = !!openStep[key];
          const isLearned = !!learned[key];
          const isSpeaking = speakingKey===key;
          return '<div class="step-card '+(isOpen?"open":"")+' '+(isLearned?"learned":"")+'">'
            + '<div class="step-head" data-action="toggle-open" data-cat="'+cat.id+'" data-idx="'+i+'">'
              + '<div class="step-num">'+(isLearned?"✓":(i+1))+'</div>'
              + '<div class="step-title">'+escapeHtml(s.t)+'</div>'
              + '<div class="chev">▾</div>'
            + '</div>'
            + '<div class="step-body">'
              + '<div class="step-body-inner">'
              + stepBodyHtml(s.b)
                + (s.warn ? warnBoxHtml(s.warn) : "")
                + '<div class="btn-row">'
                  + '<button class="btn btn-read '+(isSpeaking?"speaking":"")+'" data-action="speak" data-cat="'+cat.id+'" data-idx="'+i+'">'
                    + (isSpeaking? "⏹ עוצרים" : "🔊 הקריאו לי את זה")
                  + '</button>'
                  + '<button class="btn btn-learn '+(isLearned?"on":"")+'" data-action="toggle-learned" data-cat="'+cat.id+'" data-idx="'+i+'">'
                    + (isLearned? "✓ סימנו שלמדתי" : "סמנו שלמדתי")
                  + '</button>'
                + '</div>'
              + '</div>'
            + '</div>'
          + '</div>';
        }).join("")
      + '<p class="disclaimer">סיימתם את כל השלבים? חזרו לרשימת הנושאים ובחרו את הבא בתור.</p>'
    + '</main>';
}

function render(){
  if(view.name==="home") renderHome();
  else renderCategory();
}

/* ---------- single delegated click handler (avoids inline-onclick quoting bugs) ---------- */
document.getElementById("app").addEventListener("click", function(e){
  const el = e.target.closest("[data-action]");
  if(!el) return;
  const action = el.getAttribute("data-action");
  const catId = el.getAttribute("data-cat");
  const idx = el.getAttribute("data-idx");

  if(action === "open-cat"){ goCategory(catId); }
  else if(action === "go-home"){ goHome(); }
  else if(action === "scale-up"){ changeScale(0.08); }
  else if(action === "scale-down"){ changeScale(-0.08); }
  else if(action === "toggle-open"){ e.stopPropagation(); toggleOpen(catId, +idx); }
  else if(action === "toggle-learned"){ e.stopPropagation(); toggleLearned(catId, +idx); }
  else if(action === "speak"){
    e.stopPropagation();
    const cat = findCategory(catId);
    const step = cat.steps[+idx];
    speak(stepSpeechText(step), catId+"-"+idx);
  }
});

document.documentElement.style.setProperty("--scale", scale);

/* =========================================================
   REGISTRATION GATE
   Replace REG_ENDPOINT_URL with your own Google Apps Script Web App URL
   (see setup instructions provided separately) to log submissions into
   a Google Sheet. Leave as-is to skip server logging (local-only gate).
   ========================================================= */
const REG_ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbzpAaCYi-9SvEGc2Cxqk2jaJNjMGME37mD4TWz8VA7Om9yIg6C8Mv7NeTfcOQUc5oKyLA/exec";

function emailLooksValid(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

function detectDeviceType(){
  const ua = (navigator.userAgent || "") + " " + (navigator.platform || "");
  if(/iPhone/i.test(ua)) return "iPhone";
  if(/iPad/i.test(ua)) return "iPad";
  if(/Android/i.test(ua)){
    if(/SM-|Samsung|GT-/i.test(ua)) return "Galaxy/Samsung (טלפון)";
    return "Android אחר (טלפון/טאבלט)";
  }
  // iPadOS 13+ often disguises itself as a Mac; detect via touch support
  if(/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1) return "iPad (מצב שולחני)";
  if(/Windows|Macintosh|Linux/i.test(ua)) return "מחשב שולחני/נייד";
  return "לא זוהה";
}

async function initGate(){
  const already = await universalGet(REG_STORAGE_KEY);
  if(already === "1"){
    startApp();
    return;
  }
  document.getElementById("gate").style.display = "flex";
  document.getElementById("g-submit").addEventListener("click", handleGateSubmit);
}

async function handleGateSubmit(){
  const first = document.getElementById("g-first").value.trim();
  const last = document.getElementById("g-last").value.trim();
  const phone = document.getElementById("g-phone").value.trim();
  const email = document.getElementById("g-email").value.trim();
  const city = document.getElementById("g-city").value.trim();
  const org = document.getElementById("g-org").value.trim();
  const errEl = document.getElementById("g-error");
  const btn = document.getElementById("g-submit");

  if(!first || !last || !phone || !emailLooksValid(email) || !city || !org){
    errEl.style.display = "block";
    return;
  }
  errEl.style.display = "none";
  btn.disabled = true;
  btn.textContent = "שולח...";

  if(REG_ENDPOINT_URL && REG_ENDPOINT_URL.indexOf("REPLACE_WITH") === -1){
    try{
      const params = new URLSearchParams();
      params.append("firstName", first);
      params.append("lastName", last);
      params.append("phone", phone);
      params.append("email", email);
      params.append("city", city);
      params.append("org", org);
      params.append("deviceType", detectDeviceType());
      params.append("timestamp", new Date().toISOString());
      await fetch(REG_ENDPOINT_URL, {
        method:"POST",
        mode:"no-cors",
        headers:{ "Content-Type":"application/x-www-form-urlencoded" },
        body: params.toString()
      });
    }catch(e){ console.error("registration send failed", e); }
  }

  await universalSet(REG_STORAGE_KEY, "1");
  document.getElementById("gate").style.display = "none";
  startApp();
}

function startApp(){
  loadProgress();
}

initGate();
</script>
