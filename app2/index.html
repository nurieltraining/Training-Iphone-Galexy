<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>לומדים בקלות</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<noscript>
  <div style="padding:24px;font-family:sans-serif;text-align:center;direction:rtl;">
    <p style="font-size:1.2em;font-weight:700;">האפליקציה דורשת JavaScript פעיל</p>
    <p>נא לפתוח את הקישור ב-Safari או Chrome, לא בתצוגה מקדימה של אפליקציה אחרת.</p>
  </div>
</noscript>

<div class="app" id="app"></div>

<div id="gate" style="display:none;">
  <div class="gate-card">
    <img class="gate-logo" src="images/logo.webp" alt="לוגו" loading="lazy">
    <p class="gate-title">ברוכים הבאים ללומדים בקלות</p>
    <p class="gate-sub">לפני שנתחיל, נא למלא כמה פרטים קצרים</p>
    <div class="gate-field"><label for="g-first">שם פרטי</label><input id="g-first" type="text" autocomplete="given-name"></div>
    <div class="gate-field"><label for="g-last">שם משפחה</label><input id="g-last" type="text" autocomplete="family-name"></div>
    <div class="gate-field"><label for="g-phone">מספר טלפון</label><input id="g-phone" type="tel" autocomplete="tel"></div>
    <div class="gate-field"><label for="g-email">אימייל</label><input id="g-email" type="email" autocomplete="email"></div>
    <div class="gate-field"><label for="g-city">עיר</label><input id="g-city" type="text" autocomplete="address-level2"></div>
    <div class="gate-field"><label for="g-org">שם המסגרת</label><input id="g-org" type="text"></div>
    <p class="gate-error" id="g-error" style="display:none;">נא למלא את כל השדות (כולל אימייל תקין)</p>
    <button class="gate-submit" id="g-submit">כניסה לאפליקציה</button>
    <p class="gate-note">הפרטים נשלחים לרישום שימוש בלבד ואינם מוצגים לאף משתמש אחר.</p>
  </div>
</div>

<!--
  Script load order matters: each module attaches itself to window.App and may
  depend on ones loaded before it. utils.js must always load first.
  Everything here is small (core shell only) — no lesson or quiz content,
  no images, no JSON, is loaded by this HTML file itself.
-->
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/loader.js"></script>
<script src="js/router.js"></script>
<script src="js/speech.js"></script>
<script src="js/registration.js"></script>
<script src="js/gate-ui.js"></script>
<script src="js/feedback.js"></script>
<script src="js/search.js"></script>
<script src="js/diagrams.js"></script>
<script src="js/lesson.js"></script>
<script src="js/quiz.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
